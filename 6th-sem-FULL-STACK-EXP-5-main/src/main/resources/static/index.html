<!DOCTYPE html>
<html>

<head>
<title>Student Dashboard</title>

<link rel="stylesheet" href="style.css">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body>

<div class="sidebar">

<h2>Dashboard</h2>

<ul>
<li>Students</li>
<li>Departments</li>
<li>Reports</li>
<li>Settings</li>
</ul>

</div>


<div class="main">

<h2 class="title">Student Management</h2>


<div class="cards">

<div class="card-box blue">
<h3>Total Students</h3>
<p id="totalStudents">0</p>
</div>

<div class="card-box purple">
<h3>Departments</h3>
<p>5</p>
</div>

<div class="card-box pink">
<h3>Average GPA</h3>
<p>3.6</p>
</div>

</div>


<div class="table-card">

<input id="search" placeholder="Search student..." class="form-control mb-3">

<table class="table table-dark">

<thead>
<tr>
<th>ID</th>
<th>Name</th>
<th>Email</th>
<th>Department</th>
<th>GPA</th>
<th>Actions</th>
</tr>
</thead>

<tbody id="studentTable"></tbody>

</table>

</div>


<div class="form-card">

<h4>Add Student</h4>

<input id="firstName" placeholder="First Name" class="form-control mb-2">
<input id="lastName" placeholder="Last Name" class="form-control mb-2">
<input id="email" placeholder="Email" class="form-control mb-2">
<input id="age" placeholder="Age" class="form-control mb-2">
<input id="department" placeholder="Department" class="form-control mb-2">
<input id="gpa" placeholder="GPA" class="form-control mb-2">

<button onclick="addStudent()" class="btn btn-primary w-100">
Add Student
</button>

</div>

</div>

<script src="app.js"></script>

</body>
</html>
